<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Страница не найдена</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc, #ede9fe);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1e293b;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    .code {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      color: #2563eb;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }

    .emoji {
      font-size: 52px;
      margin-bottom: 18px;
      animation: float 2.5s ease-in-out infinite;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 30px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
    }

    .btn-primary:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #f8fafc;
      color: #334155;
      border: 1px solid #cbd5e1;
    }

    .btn-secondary:hover {
      background: #eef2ff;
      transform: translateY(-2px);
    }

    .hint {
      margin-top: 28px;
      font-size: 14px;
      color: #64748b;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 32px 22px;
      }

      .code {
        font-size: 72px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 16px;
      }

      .btn {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="emoji">🌦️</div>
    <div class="code">404</div>
    <h1 class="title">Страница не найдена</h1>
    <p class="subtitle">
      Похоже, такой страницы не существует или адрес был введён неправильно.
      Возможно, она ушла искать хорошую погоду.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">На главную</a>
      <a href="javascript:history.back()" class="btn btn-secondary">Назад</a>
    </div>

    <p class="hint">
      Проверь адрес страницы или вернись в меню поиска погоды.
    </p>
  </div>
</div>
</body>
</html>
