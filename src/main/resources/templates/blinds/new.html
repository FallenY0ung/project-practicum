<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Новые жалюзи</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Smart Home</p>
      <h1>Создание жалюзи</h1>
      <p class="subtitle">Добавьте новое устройство в систему</p>
    </div>

    <a class="btn btn-secondary" th:href="@{/blinds}">← Назад к списку</a>
  </header>

  <section class="card form-card">
    <div class="card-header">
      <h2>Новые жалюзи</h2>
    </div>

    <form th:action="@{/blinds}" th:object="${blinds}" method="post" class="form-grid">
      <div class="form-group">
        <label for="state">Состояние</label>
        <select id="state" th:field="*{state}" required>
          <option value="">Выберите состояние</option>
          <option value="OPEN">OPEN</option>
          <option value="CLOSED">CLOSED</option>
          <option value="HALF_OPEN">HALF_OPEN</option>
        </select>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" th:field="*{isOnline}">
          <span>Устройство онлайн</span>
        </label>
      </div>

      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" th:field="*{isBroken}">
          <span>Устройство сломано</span>
        </label>
      </div>

      <div class="form-actions">
        <a class="btn btn-secondary" th:href="@{/blinds}">Отмена</a>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </section>
</div>
</body>
</html>
