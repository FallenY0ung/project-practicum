<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование жалюзи</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="page">
    <header class="page-header">
        <div>
            <p class="eyebrow">Smart Home</p>
            <h1>Редактирование жалюзи</h1>
            <p class="subtitle">
                Настройка устройства
                <span th:text="'#' + ${blinds.id}">#1</span>
            </p>
        </div>

        <a class="btn btn-secondary" th:href="@{/blinds}">← Назад к списку</a>
    </header>

    <section class="card form-card">
        <div class="card-header">
            <h2 th:text="'Жалюзи #' + ${blinds.id}">Жалюзи</h2>
        </div>

        <form th:action="@{/blinds/{id}(id=${blinds.id})}"
              th:object="${blinds}"
              method="post"
              class="form-grid">

            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="state">Состояние</label>
                <select id="state" th:field="*{state}" required>
                    <option value="OPEN">OPEN</option>
                    <option value="CLOSED">CLOSED</option>
                    <option value="HALF_OPEN">HALF_OPEN</option>
                </select>
            </div>

            <div class="form-group">
                <label for="updatedAt">Последнее обновление</label>
                <input id="updatedAt"
                       type="text"
                       th:value="${#temporals.format(blinds.updatedAt, 'dd.MM.yyyy HH:mm')}"
                       readonly>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" th:field="*{isOnline}">
                    <span>Устройство онлайн</span>
                </label>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" th:field="*{isBroken}">
                    <span>Устройство сломано</span>
                </label>
            </div>

            <div class="form-actions">
                <a class="btn btn-secondary" th:href="@{/blinds}">Отмена</a>
                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
            </div>
        </form>
    </section>

    <section class="card section-spacing">
        <div class="card-header">
            <h2>Расписания</h2>
            <span class="badge" th:text="${#lists.size(schedules)} + ' шт.'">0 шт.</span>
        </div>

        <div th:if="${#lists.isEmpty(schedules)}" class="empty-state compact-empty">
            <p>Для этих жалюзи пока нет расписаний.</p>
        </div>

        <div th:if="${!#lists.isEmpty(schedules)}" class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Открыть в</th>
                    <th>Закрыть в</th>
                    <th>Активно</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="schedule : ${schedules}">
                    <td th:text="${schedule.id}">1</td>
                    <td th:text="${#temporals.format(schedule.openAt, 'HH:mm')}">08:00</td>
                    <td th:text="${#temporals.format(schedule.closeAt, 'HH:mm')}">21:00</td>
                    <td>
                        <span class="status-pill status-success" th:if="${schedule.enabled}">Да</span>
                        <span class="status-pill status-muted" th:unless="${schedule.enabled}">Нет</span>
                    </td>
                    <td>
                        <div class="actions">
                            <form th:action="@{/blinds/{blindId}/schedules/{scheduleId}/delete(blindId=${blinds.id}, scheduleId=${schedule.id})}"
                                  method="post"
                                  onsubmit="return confirm('Удалить это расписание?');">
                                <button type="submit" class="btn btn-danger">Удалить</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="card section-spacing form-card">
        <div class="card-header">
            <h2>Добавить расписание</h2>
        </div>

        <form th:action="@{/blinds/{scheduleId}/schedules(scheduleId=${blinds.id})}"
              th:object="${newSchedule}"
              method="post"
              class="form-grid">

            <div class="form-group">
                <label for="openAt">Открыть в</label>
                <input id="openAt"
                       type="time"
                       th:field="*{openAt}"
                       required>
            </div>

            <div class="form-group">
                <label for="closeAt">Закрыть в</label>
                <input id="closeAt"
                       type="time"
                       th:field="*{closeAt}"
                       required>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" th:field="*{enabled}">
                    <span>Активное расписание</span>
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Добавить расписание</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
